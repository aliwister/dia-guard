# DIA-GUARD Full FT Config — Llama-3.2-1B-Instruct (Student Baseline)
# Usage: python train_ce.py --config configs/llama_1b.yaml

# Model
model_name: meta-llama/Llama-3.2-1B-Instruct
trust_remote_code: false
attn_implementation: eager  # set to "eager" if flash-attn unavailable

# Data
train_data: null          # override with --train_data /path/to/train.jsonl
eval_data: null           # override with --eval_data /path/to/eval.jsonl
max_seq_length: 2048

# Output
output_dir: ../../../models/group3_student_ft_baseline/full_ft/llama-3_2-1b-instruct
run_name: llama-3.2-1b-ce-ft

# Training
num_epochs: 3
per_device_train_batch_size: 4
per_device_eval_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 3.0e-5
warmup_steps: 4218
weight_decay: 0.01
lr_scheduler_type: cosine
max_grad_norm: 1.0

# Precision & memory
bf16: true
tf32: true
gradient_checkpointing: true

# Logging & evaluation
logging_steps: 10
eval_strategy: steps
eval_steps: 200
save_strategy: steps
save_steps: 500
save_total_limit: 3
load_best_model_at_end: true
metric_for_best_model: eval_loss

# Contrastive loss weights (used only in train_contrastive.py)
alpha: 0.7          # weight for CE loss; (1-alpha) for contrastive
margin: 0.3         # triplet margin
temperature: 0.05   # SimCSE temperature

# W&B logging (optional)
report_to: wandb    # set to "none" to disable
