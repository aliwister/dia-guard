# DIA-GUARD Full FT Config — Qwen3Guard-Gen-8B (Teacher)
# Usage: accelerate launch --config_file configs/accel_ds_zero3_4gpu.yaml --num_processes 4 train_ce.py --config configs/qwen3guard_8b.yaml

# Model
model_name: Qwen/Qwen3Guard-Gen-8B
trust_remote_code: true
attn_implementation: flash_attention_2

# Data
train_data: null
eval_data: null
max_seq_length: 2048

# Output
output_dir: ../../../models/FT/full_ft/qwen3guard_gen_8b
run_name: qwen3guard-8b-ce-ft

# Training
num_epochs: 3
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 2.0e-5
warmup_steps: 4218
weight_decay: 0.01
lr_scheduler_type: cosine
max_grad_norm: 1.0

# Precision & memory
bf16: true
tf32: true
gradient_checkpointing: true

# Logging & evaluation
logging_steps: 10
eval_strategy: steps
eval_steps: 200
save_strategy: steps
save_steps: 400
save_total_limit: 3
load_best_model_at_end: true
metric_for_best_model: eval_loss

# Contrastive loss weights (used only in train_contrastive.py)
alpha: 0.7
margin: 0.3
temperature: 0.05

# W&B logging
report_to: wandb
