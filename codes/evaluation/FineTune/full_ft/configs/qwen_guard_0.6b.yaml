# DIA-GUARD Full FT Config — Qwen3Guard-Gen-0.6B (Student Baseline)
# Usage: python train_ce.py --config configs/qwen_guard_0.6b.yaml

# Model
model_name: Qwen/Qwen3Guard-Gen-0.6B
trust_remote_code: true
attn_implementation: flash_attention_2

# Data
train_data: null
eval_data: null
max_seq_length: 2048

# Output
output_dir: ../../../models/group3_student_ft_baseline/full_ft/qwen3guard-gen-0_6b
run_name: qwen3guard-0.6b-ce-ft

# Training
num_epochs: 3
per_device_train_batch_size: 4
per_device_eval_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 5.0e-5
warmup_steps: 4218
weight_decay: 0.01
lr_scheduler_type: cosine
max_grad_norm: 1.0

# Precision & memory
bf16: true
tf32: true
gradient_checkpointing: true

# Logging & evaluation
logging_steps: 10
eval_strategy: steps
eval_steps: 200
save_strategy: steps
save_steps: 500
save_total_limit: 3
load_best_model_at_end: true
metric_for_best_model: eval_loss

# Contrastive loss weights (used only in train_contrastive.py)
alpha: 0.7
margin: 0.3
temperature: 0.05

# W&B logging (optional)
report_to: wandb
