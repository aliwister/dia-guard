# DIA-GUARD PEFT Config — Llama-3.2-1B-Instruct with LoRA (Student Baseline)
# Usage: python train_ce_lora.py --config configs/llama_1b_lora.yaml

# Model
model_name: meta-llama/Llama-3.2-1B-Instruct
trust_remote_code: false
attn_implementation: flash_attention_2  # set to "eager" if flash-attn unavailable

# QLoRA (4-bit quantization) — set to false for standard LoRA (bf16)
use_qlora: false
load_in_4bit: false
bnb_4bit_quant_type: nf4
bnb_4bit_compute_dtype: bfloat16
bnb_4bit_use_double_quant: true

# LoRA Config
lora_r: 64
lora_alpha: 128
lora_dropout: 0.05
lora_bias: none
use_rslora: true
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
task_type: CAUSAL_LM

# Data
train_data: null
eval_data: null
max_seq_length: 2048

# Output
output_dir: ../../../models/group3_student_ft_baseline/peft/llama-3_2-1b-instruct
run_name: llama-3.2-1b-lora

# Training
num_epochs: 3
per_device_train_batch_size: 8
per_device_eval_batch_size: 8
gradient_accumulation_steps: 2
learning_rate: 2.0e-4
warmup_ratio: 0.03
weight_decay: 0.01
lr_scheduler_type: cosine
max_grad_norm: 1.0

# Precision
bf16: true
tf32: true
gradient_checkpointing: true

# Logging
logging_steps: 10
eval_strategy: steps
eval_steps: 200
save_strategy: steps
save_steps: 500
save_total_limit: 3
load_best_model_at_end: true

# Contrastive loss (used by train_contrastive_lora.py only)
alpha: 0.7
margin: 0.3
temperature: 0.05

# W&B
report_to: wandb
