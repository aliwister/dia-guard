# DIA-GUARD PEFT Config — tiny-aya-global (3B) with LoRA
# Usage: python train_ce_lora.py --config configs/aya_3b_lora.yaml

model_name: CohereLabs/tiny-aya-global
trust_remote_code: true
attn_implementation: flash_attention_2

use_qlora: true
load_in_4bit: true
bnb_4bit_quant_type: nf4
bnb_4bit_compute_dtype: bfloat16
bnb_4bit_use_double_quant: true

lora_r: 64
lora_alpha: 128
lora_dropout: 0.05
lora_bias: none
use_rslora: true          # Rank-Stabilized LoRA: alpha/sqrt(r), recommended for r>=16
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
task_type: CAUSAL_LM

train_data: null
eval_data: null
max_seq_length: 2048

output_dir: ../../../models/FT/peft/tiny_aya_global
run_name: aya-3b-lora

num_epochs: 3
per_device_train_batch_size: 2
per_device_eval_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 2.0e-4
warmup_steps: 4218
weight_decay: 0.01
lr_scheduler_type: cosine
max_grad_norm: 1.0

bf16: false
tf32: true
gradient_checkpointing: true

logging_steps: 10
eval_strategy: steps
eval_steps: 200
save_strategy: steps
save_steps: 400
save_total_limit: 3
load_best_model_at_end: false

alpha: 0.7
margin: 0.3
temperature: 0.05

report_to: wandb

# Early stopping (requires eval_data and metric_for_best_model: eval_loss)
early_stopping: true
early_stopping_patience: 3
early_stopping_threshold: 0.0

# Speed optimizations
use_liger_kernel: true
dataloader_num_workers: 0
dataloader_pin_memory: true
